.rules_frontend_trigger_pipeline_deploy:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "prod"
        FRONT_OUT_PORT: "$FRONT_OUT_PORT_PROD"

    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "prod"
        FRONT_OUT_PORT: "$FRONT_OUT_PORT_PROD"
      changes:
        - frontend/**/*

    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "develop"'
      variables:
        DEPLOY_ENV: "develop"
        FRONT_OUT_PORT: "$FRONT_OUT_PORT_DEV"

    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        DEPLOY_ENV: "develop"
        FRONT_OUT_PORT: "$FRONT_OUT_PORT_DEV"
      changes:
        - frontend/**/*

    - when: never
