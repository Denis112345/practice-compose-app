default:
  before_script:
    - date +%s > .job_start_time
    - echo "Job $CI_JOB_NAME preparation"
    - command -v docker >/dev/null 2>&1 && echo "Docker version $(docker -v)" || true
    - command -v node >/dev/null 2>&1 && echo "Node version $(node -v)" || true
  after_script:
    - START_TIME=$(cat .job_start_time)
    - END_TIME=$(date +%s)
    - echo "Job $CI_JOB_NAME was done in $((END_TIME - START_TIME))s"

.docker_tag_node_img:
  tags:
    - docker
  image: node:20-slim
