variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

.cache_npm_download_libs_pull_push:
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull-push

.cache_npm_download_libs_pull:
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull-push
