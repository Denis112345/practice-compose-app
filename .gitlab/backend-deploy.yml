stages:
  - deploy-backend


deploy-backend:
  stage: deploy-backend
  tags:
    - docker
  script:
    - echo "ENV SET"
    - echo "---------------------------------------------------"
    - cd "$CI_PROJECT_DIR"
    - cp $compose_project_backend_env backend/.env
    - cp $compose_project_frontend_env frontend/.env
    - cp $compose_project_env .env
    - echo "BACKEND_PORT=$BACKEND_OUT_PORT" >> .env
    - echo "---------------------------------------------------\n\n"
    - echo "DEPLOY"
    - echo "---------------------------------------------------"
    - docker compose -f docker-compose-gitlab.yml pull backend
    - docker compose -f docker-compose-gitlab.yml up -d --force-recreate --no-deps backend
    - echo "---------------------------------------------------"

  environment:
    name: $DEPLOY_ENV
    url: http://localhost:$BACKEND_OUT_PORT
