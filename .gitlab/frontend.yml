include:
  - local: ".gitlab/frontend-rules.yml"

frontend:
  stage: build-and-push-docker-image
  extends: .rules_frontend
  trigger:
    include: .gitlab/frontend-delivery.yml
    strategy: depend

deploy-frontend:
  stage: deploy
  extends: .rules_frontend_deploy
  trigger:
    include: .gitlab/frontend-deploy.yml
    strategy: depend
  needs:
    - job: frontend
      optional: true
    - job: deploy-backend
      optional: true

  environment:
    name: $DEPLOY_ENV
    url: http://localhost:$FRONT_OUT_PORT