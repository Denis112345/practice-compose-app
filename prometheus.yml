global:
  scrape_interval: 2s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "server"
    static_configs:
      - targets: ["node-expoter:9100"]
        labels:
          app: "server-node-exporter"

  - job_name: "containers"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          app: "containers-cadvisor"