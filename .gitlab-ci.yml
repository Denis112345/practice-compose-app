workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always

stages:
  - build
  - test

build:
  stage: build
  tags:
    - docker
  script:
    - cd backend
    - docker build -t registry:5000/backend:1.0.0 .
  artifacts:
    paths:
      - backend/dist
      - backend/package.json
      - backend/package-lock.json
    expire_in: 1 hour

test:
  stage: test
  tags:
    - docker
  image: node:20-slim
  needs:
    - job: build
      artifacts: true
  script:
    - cd backend
    - npm ci
    - npm run test
