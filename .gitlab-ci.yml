workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build-app
  - test
  - build-and-push-docker-image
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

default:
  before_script:
    - export START_TIME=$(date +%s)
    - echo "Job $CI_JOB_NAME preparation"
    - command -v docker >/dev/null 2>&1 && echo "Docker version: $(docker -v)"
    - command -v node >/dev/null 2>&1 && echo "Node version: $(node -v)"
  after_script:
    - export END_TIME=$(date +%s)
    - echo "Job $CI_JOB_NAME was done in $((END_TIME - START_TIME))"
build-app:
  stage: build-app
  tags:
    - docker
  image: node:20-slim
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - echo "NODE VERSION:"
    - node -v
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/dist
      - backend/package.json
      - backend/package-lock.json

test:
  stage: test
  tags:
    - docker
  image: node:20-slim
  before_script:
    - echo "NODE VERSION:"
    - node -v
  needs:
    - job: build-app
      artifacts: true
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - cd backend
    - npm ci
    - npm run test:dist

backend:
  stage: build-and-push-docker-image
  tags:
    - docker
  script:
    - cd backend
    - cp $compose_project_backend_env .env
    - docker build -t localhost:5000/backend:1.0.0 .
    - docker push localhost:5000/backend:1.0.0
  rules:
    - changes:
      - backend/**/*

frontend:
  stage: build-and-push-docker-image
  tags:
    - docker
  script:
    - cd frontend
    - cp $compose_project_frontend_env .env
    - docker build -t localhost:5000/frontend:1.0.0 .
    - docker push localhost:5000/frontend:1.0.0
  rules:
    - changes:
      - frontend/**/*

deploy-backend:
  stage: deploy
  tags:
    - docker
  script:
    - cd "$CI_PROJECT_DIR"
    - cp $compose_project_backend_env backend/.env
    - cp $compose_project_frontend_env frontend/.env
    - cp $compose_project_env .env
    - docker compose -f docker-compose-gitlab.yml pull backend
    - docker compose -f docker-compose-gitlab.yml up -d --force-recreate --no-deps backend
  needs:
    - job: backend
  rules:
    - changes:
      - backend/**/*

deploy-frontend:
  stage: deploy
  tags:
    - docker
  script:
    - cd "$CI_PROJECT_DIR"
    - cp $compose_project_backend_env backend/.env
    - cp $compose_project_frontend_env frontend/.env
    - cp $compose_project_env .env
    - docker compose -f docker-compose-gitlab.yml pull frontend
    - docker compose -f docker-compose-gitlab.yml up -d --force-recreate --no-deps frontend
  needs:
    - job: frontend
  rules:
    - changes:
      - frontend/**/*