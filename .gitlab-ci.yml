workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - build-app
  - test
  - build-and-push-docker-image
  - deploy

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

default:
  before_script:
    - date +%s > .job_start_time
    - echo "Job $CI_JOB_NAME preparation"
    - command -v docker >/dev/null 2>&1 && echo "Docker version $(docker -v)" || true
    - command -v node >/dev/null 2>&1 && echo "Node version $(node -v)" || true
  after_script:
    - START_TIME=$(cat .job_start_time)
    - END_TIME=$(date +%s)
    - echo "Job $CI_JOB_NAME was done in $((END_TIME - START_TIME))s"

build-app:
  stage: build-app
  tags:
    - docker
  image: node:20-slim
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull-push
  script:
    - cd backend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - backend/dist
      - backend/package.json
      - backend/package-lock.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - backend/**/*
    - when: never

test:
  stage: test
  tags:
    - docker
  image: node:20-slim
  needs:
    - job: build-app
      artifacts: true
      optional: true
  cache:
    key:
      files:
        - backend/package-lock.json
    paths:
      - .npm/
    policy: pull
  script:
    - cd backend
    - npm ci
    - npm run test:dist
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - backend/**/*
    - when: never

backend:
  stage: build-and-push-docker-image
  tags:
    - docker
  needs:
    - job: test
      optional: true
  script:
    - cd backend
    - cp $compose_project_backend_env .env
    - docker build -t localhost:5000/backend:1.0.0 .
    - docker push localhost:5000/backend:1.0.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - backend/**/*
    - when: never

frontend:
  stage: build-and-push-docker-image
  tags:
    - docker
  script:
    - cd frontend
    - cp $compose_project_frontend_env .env
    - docker build -t localhost:5000/frontend:1.0.0 .
    - docker push localhost:5000/frontend:1.0.0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
    - changes:
        - frontend/**/*
    - when: never

deploy-backend:
  stage: deploy
  tags:
    - docker
  script:
    - cd "$CI_PROJECT_DIR"
    - cp $compose_project_backend_env backend/.env
    - cp $compose_project_frontend_env frontend/.env
    - cp $compose_project_env .env
    - export BACKEND_PORT="$DEPLOY_PORT"
    - docker compose -f docker-compose-gitlab.yml pull backend
    - docker compose -f docker-compose-gitlab.yml up -d --force-recreate --no-deps backend
  needs:
    - job: backend
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "prod"
        DEPLOY_PORT: "8512"
      when: manual

    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "develop"'
      variables:
        DEPLOY_ENV: "develop"
        DEPLOY_PORT: "8513"
      when: manual

    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "prod"
        DEPLOY_PORT: "8512"
      changes:
        - backend/**/*
      when: manual

    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        DEPLOY_ENV: "develop"
        DEPLOY_PORT: "8513"
      changes:
        - backend/**/*

    - when: never

  environment:
    name: $DEPLOY_ENV
    url: http://localhost:$DEPLOY_PORT

deploy-frontend:
  stage: deploy
  tags:
    - docker
  script:
    - cd "$CI_PROJECT_DIR"
    - cp $compose_project_backend_env backend/.env
    - cp $compose_project_frontend_env frontend/.env
    - cp $compose_project_env .env
    - export FRONT_PORT="$DEPLOY_PORT"
    - docker compose -f docker-compose-gitlab.yml pull frontend
    - docker compose -f docker-compose-gitlab.yml up -d --force-recreate --no-deps frontend
  needs:
    - job: frontend
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"'
      variables:
        DEPLOY_ENV: "prod"
        DEPLOY_PORT: "8251"
      when: manual

    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "develop"'
      variables:
        DEPLOY_ENV: "develop"
        DEPLOY_PORT: "8252"
      when: manual

    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - frontend/**/*
      variables:
        DEPLOY_ENV: "prod"
        DEPLOY_PORT: "8251"
      when: manual

    - if: '$CI_COMMIT_BRANCH == "develop"'
      changes:
        - frontend/**/*
      variables:
        DEPLOY_ENV: "develop"
        DEPLOY_PORT: "8252"

    - when: never

  environment:
    name: $DEPLOY_ENV
    url: http://localhost:$DEPLOY_PORT